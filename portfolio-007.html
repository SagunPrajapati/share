<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPSE Portfolio Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0b0f0c;
  --surface: #111813;
  --surface2: #161d17;
  --border: #1e2d20;
  --border2: #243027;
  --green: #2ecc71;
  --green-dim: #1a7a42;
  --green-glow: rgba(46,204,113,0.12);
  --red: #e74c3c;
  --red-dim: #7a1e16;
  --red-glow: rgba(231,76,60,0.12);
  --amber: #f39c12;
  --blue: #3498db;
  --text: #e8f5ea;
  --text2: #7aaa80;
  --text3: #3d5e42;
  --accent: #2ecc71;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; overflow-x: hidden; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--green);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  color: #0b0f0c;
}
.logo-text { font-family: var(--font-head); font-size: 16px; font-weight: 800; color: var(--text); }
.logo-sub { font-size: 10px; color: var(--text2); letter-spacing: .08em; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 10px; }
.sync-btn {
  background: var(--green-glow);
  border: 1px solid var(--green-dim);
  color: var(--green);
  padding: 7px 16px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all .2s;
}
.sync-btn:hover { background: rgba(46,204,113,.2); }
.sync-btn.loading .spin { animation: spin .6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.last-sync { font-size: 10px; color: var(--text3); }

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 65px); }

/* SIDEBAR */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px 0;
}
.sidebar-label {
  font-size: 9px;
  font-weight: 500;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .1em;
  padding: 12px 18px 6px;
}
.portfolio-item {
  padding: 9px 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-left: 3px solid transparent;
  transition: all .15s;
  font-size: 12px;
  color: var(--text2);
}
.portfolio-item:hover { background: var(--green-glow); color: var(--text); border-left-color: var(--green-dim); }
.portfolio-item.active { background: var(--green-glow); color: var(--green); border-left-color: var(--green); font-weight: 500; }
.portfolio-item .p-badge {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--surface2);
  color: var(--text3);
}
.portfolio-item.active .p-badge { background: var(--green-dim); color: var(--green); }
.add-portfolio-btn {
  margin: 10px 14px 0;
  background: none;
  border: 1px dashed var(--border2);
  border-radius: 6px;
  color: var(--text3);
  padding: 8px;
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-family: var(--font-mono);
  transition: all .2s;
}
.add-portfolio-btn:hover { border-color: var(--green-dim); color: var(--green); }

/* MAIN */
.main { flex: 1; padding: 24px 28px; overflow-y: auto; }

/* SUMMARY CARDS */
.summary-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.sum-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.sum-card.green::before { background: var(--green); }
.sum-card.red::before { background: var(--red); }
.sum-card.amber::before { background: var(--amber); }
.sum-card.blue::before { background: var(--blue); }
.sum-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.sum-val { font-family: var(--font-head); font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.sum-val.pos { color: var(--green); }
.sum-val.neg { color: var(--red); }
.sum-val.neutral { color: var(--text); }
.sum-sub { font-size: 10px; color: var(--text2); }

/* SECTION HEADER */
.sec-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.sec-title {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.sec-title .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
}
.action-btns { display: flex; gap: 8px; }
.btn {
  padding: 7px 14px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all .15s;
}
.btn-green { background: var(--green); color: #0b0f0c; }
.btn-green:hover { background: #27ae60; }
.btn-outline { background: none; border: 1px solid var(--border2); color: var(--text2); }
.btn-outline:hover { border-color: var(--green-dim); color: var(--green); }
.btn-red { background: var(--red-glow); border: 1px solid var(--red-dim); color: var(--red); }
.btn-red:hover { background: rgba(231,76,60,.2); }
.btn-amber { background: rgba(243,156,18,.1); border: 1px solid rgba(243,156,18,.3); color: var(--amber); }

/* TABLE */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
.tbl { width: 100%; border-collapse: collapse; font-size: 11px; }
.tbl th {
  background: var(--surface2);
  padding: 9px 12px;
  font-size: 9px;
  font-weight: 500;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .08em;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.tbl td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  vertical-align: middle;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--green-glow); }
.tbl .sym { font-family: var(--font-head); font-weight: 700; color: var(--text); font-size: 13px; }
.tbl .pos { color: var(--green); font-weight: 500; }
.tbl .neg { color: var(--red); font-weight: 500; }
.tbl .neutral { color: var(--text2); }
.tbl .total-row td { background: var(--surface2) !important; border-top: 2px solid var(--border2); color: var(--text); font-weight: 500; }

/* LTP badge */
.ltp-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}
.ltp-up { background: var(--green-glow); color: var(--green); border: 1px solid var(--green-dim); }
.ltp-down { background: var(--red-glow); color: var(--red); border: 1px solid var(--red-dim); }
.ltp-flat { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

/* EDIT BTN */
.edit-inline {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text3);
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  cursor: pointer;
  font-family: var(--font-mono);
  transition: all .15s;
}
.edit-inline:hover { border-color: var(--amber); color: var(--amber); }

/* CHARTS ROW */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
}
.chart-card h3 {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 14px;
}
.chart-wrap { position: relative; height: 220px; }

/* HISTORY TABLE */
.history-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.history-tabs { display: flex; border-bottom: 1px solid var(--border); }
.h-tab {
  padding: 10px 18px;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  font-weight: 500;
  transition: all .15s;
}
.h-tab.active { color: var(--green); border-bottom-color: var(--green); }
.h-tab:hover { color: var(--text2); }
.tab-content { display: none; padding: 14px; }
.tab-content.active { display: block; }

/* MODAL OVERLAY */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 28px;
  width: 420px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  animation: slideUp .2s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h2 { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.form-row input, .form-row select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 9px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border .15s;
}
.form-row input:focus, .form-row select:focus { border-color: var(--green-dim); }
.form-row select option { background: var(--surface2); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; }

/* TRANSACTION TYPE */
.tx-type-row { display: flex; gap: 8px; margin-bottom: 14px; }
.tx-type-btn {
  flex: 1;
  padding: 9px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text3);
  transition: all .15s;
}
.tx-type-btn.buy.active { background: var(--green-glow); border-color: var(--green-dim); color: var(--green); }
.tx-type-btn.sell.active { background: var(--red-glow); border-color: var(--red-dim); color: var(--red); }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text3);
}
.empty-state .es-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 12px; line-height: 1.6; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface2);
  border: 1px solid var(--green-dim);
  color: var(--green);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 9999;
  transform: translateY(20px);
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { border-color: var(--red-dim); color: var(--red); }

/* PORTFOLIO SWITCHER CARDS */
.p-switcher-card {
  margin: 0 10px 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all .2s;
  position: relative;
}
.p-switcher-card:hover { border-color: var(--border2); background: var(--green-glow); }
.p-switcher-card.active { border-color: var(--green-dim); background: var(--green-glow); }
.p-switcher-card.active::after {
  content: '✓';
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--green);
  font-weight: 700;
}
.p-avatar {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
  color: #0b0f0c;
}
.p-info { flex: 1; min-width: 0; }
.p-info-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-info-meta { font-size: 10px; color: var(--text3); margin-top: 1px; }
.p-pl-badge { font-size: 10px; font-weight: 700; text-align: right; }

/* COMBINED SUMMARY BAR */
.combined-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 0;
  overflow: hidden;
}
.combined-bar-item {
  flex: 1;
  text-align: center;
  padding: 0 14px;
  border-right: 1px solid var(--border);
}
.combined-bar-item:last-child { border-right: none; }
.cb-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.cb-val { font-family: var(--font-head); font-size: 16px; font-weight: 700; }

/* PORTFOLIO SWITCHER TOPBAR */
.p-switcher-topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.p-switch-btn {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--surface2);
  transition: all .2s;
  position: relative;
}
.p-switch-btn:hover { border-color: var(--border2); }
.p-switch-btn.active { background: var(--green-glow); border-color: var(--green-dim); }
.p-switch-btn.active::before {
  content: '';
  position: absolute;
  top: -1px; left: 0; right: 0;
  height: 2px;
  border-radius: 2px 2px 0 0;
  background: var(--green);
}
.psb-avatar { width: 32px; height: 32px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 11px; font-weight: 800; color: #0b0f0c; flex-shrink: 0; }
.psb-info { flex: 1; text-align: left; }
.psb-name { font-size: 12px; font-weight: 600; color: var(--text); font-family: var(--font-head); }
.psb-pl { font-size: 11px; font-weight: 700; margin-top: 1px; }
.psb-holdings { font-size: 10px; color: var(--text3); }
.p-switch-divider { width: 1px; height: 48px; background: var(--border2); flex-shrink: 0; }

  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.portfolio-name { font-family: var(--font-head); font-size: 24px; font-weight: 800; color: var(--text); }
.portfolio-name-input {
  background: none;
  border: none;
  border-bottom: 1px dashed var(--border2);
  color: var(--text);
  font-family: var(--font-head);
  font-size: 24px;
  font-weight: 800;
  outline: none;
  min-width: 200px;
}
.portfolio-meta { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* WACC EDIT */
.wacc-editing { background: var(--surface2); border: 1px solid var(--amber); border-radius: 4px; padding: 3px 6px; font-family: var(--font-mono); font-size: 11px; color: var(--amber); width: 80px; outline: none; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .summary-row { grid-template-columns: 1fr 1fr; }
  .charts-row { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

/* PROFIT BAR */
.profit-bar-wrap { width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.profit-bar { height: 4px; border-radius: 2px; transition: width .3s; }
.profit-bar.pos { background: var(--green); }
.profit-bar.neg { background: var(--red); }

/* STATUS PILL */
.pill { display: inline-block; font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 3px; letter-spacing: .04em; }
.pill-green { background: var(--green-glow); color: var(--green); border: 1px solid var(--green-dim); }
.pill-red { background: var(--red-glow); color: var(--red); border: 1px solid var(--red-dim); }
.pill-amber { background: rgba(243,156,18,.1); color: var(--amber); border: 1px solid rgba(243,156,18,.3); }

/* SECTION DIVIDER */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* HISTORY item */
.tx-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.tx-item:last-child { border-bottom: none; }
.tx-buy { color: var(--green); font-weight: 500; }
.tx-sell { color: var(--red); font-weight: 500; }
.tx-sym { font-weight: 700; color: var(--text); font-size: 12px; min-width: 60px; }
.tx-date { color: var(--text3); font-size: 10px; }

/* MARKET STATUS */
.mkt-status { display: flex; align-items: center; gap: 6px; font-size: 10px; }
.mkt-dot { width: 6px; height: 6px; border-radius: 50%; }
.mkt-dot.closed { background: var(--red); }
.mkt-dot.open { background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* No data info */
.info-box {
  background: rgba(52,152,219,.08);
  border: 1px solid rgba(52,152,219,.2);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 11px;
  color: #7fb8e0;
  margin-bottom: 16px;
  line-height: 1.6;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <div class="logo-icon">📈</div>
    <div>
      <div class="logo-text">NEPSE Portfolio</div>
      <div class="logo-sub">Broker 58 · Personal Tracker</div>
    </div>
  </div>
  <div class="header-right">
    <div class="mkt-status">
      <div class="mkt-dot closed" id="mkt-dot"></div>
      <span id="mkt-status-text">Market Closed</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
      <button class="sync-btn" id="sync-btn" onclick="syncLatestPrices()">
        <span id="spin-icon">⟳</span> Sync from Merolagani
      </button>
      <span class="last-sync" id="last-sync">merolagani.com · click to sync</span>
    </div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Switch Portfolio</div>
    <div id="portfolio-list"></div>
    <button class="add-portfolio-btn" onclick="openAddPortfolio()">+ New Portfolio</button>
    <div style="flex:1;"></div>
    <div id="sidebar-combined" style="padding:12px 14px;border-top:1px solid var(--border);"></div>
    <div style="padding:8px 14px 14px;font-size:10px;color:var(--text3);line-height:1.7;">
      Prices: merolagani.com<br>
      <span id="data-date" style="color:var(--text2);">Not synced yet</span>
    </div>
  </div>

const MEROLAGANI_URL = 'https://www.merolagani.com/LatestMarket.aspx';

// Multiple public CORS proxies — tried in order
const PROXIES = [
  html => `https://api.allorigins.win/raw?url=${encodeURIComponent(html)}`,
  html => `https://corsproxy.io/?${encodeURIComponent(html)}`,
  html => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(html)}`,
  html => `https://thingproxy.freeboard.io/fetch/${html}`,
  html => `https://yacdn.org/proxy/${html}`,
];

// Optional: paste your Google Apps Script URL here for 100% reliable fetching
// See instructions in the app's debug panel
let GAS_URL = localStorage.getItem('gas_url') || '';

async function syncLatestPrices() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  const debugLines = [];
  const log = (msg) => { debugLines.push(msg); console.log('[SYNC]', msg); };

  log('Starting sync from merolagani.com...');
  updateSyncStatus('⟳ Connecting to merolagani.com...', false);

  let success = false;

  // ── 0. Google Apps Script (if configured — most reliable) ──
  if (GAS_URL) {
    try {
      log(`Trying GAS URL...`);
      updateSyncStatus('⟳ Fetching via Google Apps Script...', false);
      const res = await fetch(GAS_URL, { signal: AbortSignal.timeout(10000) });
      if (res.ok) {
        const data = await res.json();
        if (data && typeof data === 'object') {
          let count = 0;
          Object.entries(data).forEach(([sym, info]) => {
            if (sym && info.ltp) {
              state.prices[sym] = { ltp: parseFloat(info.ltp), chg: info.chg || '—', chgPt: info.chgPt || '—', prevClose: info.prevClose || null, source: 'merolagani' };
              count++;
            }
          });
          if (count > 0) {
            success = true;
            finalizePrices(count, 'Google Apps Script', debugLines);
          }
        }
      }
    } catch(e) { log(`GAS failed: ${e.message}`); }
  }

  // ── 1–5. Public CORS Proxies ──
  for (let i = 0; i < PROXIES.length && !success; i++) {
    const proxyUrl = PROXIES[i](MEROLAGANI_URL);
    const proxyName = proxyUrl.split('/')[2];
    try {
      log(`Proxy ${i+1}: ${proxyName}`);
      updateSyncStatus(`⟳ Trying proxy ${i+1}/5 — ${proxyName}...`, false);
      const res = await fetch(proxyUrl, {
        signal: AbortSignal.timeout(12000),
        headers: { 'Accept': 'text/html,application/xhtml+xml' }
      });
      log(`Proxy ${i+1} responded: HTTP ${res.status}`);
      if (res.ok) {
        const html = await res.text();
        log(`Proxy ${i+1} returned ${html.length} bytes`);
        if (html.length < 500) { log(`Too short — likely blocked`); continue; }
        const count = parseMerolaganiHTML(html, log);
        if (count > 0) {
          success = true;
          finalizePrices(count, proxyName, debugLines);
          break;
        } else {
          log(`Proxy ${i+1}: HTML received but 0 stocks parsed`);
        }
      }
    } catch(e) { log(`Proxy ${i+1} error: ${e.message}`); }
  }

  if (!success) {
    updateSyncStatus('⚠ All proxies failed — see Debug panel below', true);
    showToast('⚠ Could not fetch prices. Open Debug panel for details.', true);
    // Show debug info in the UI
    showDebugPanel(debugLines);
  }

  btn.classList.remove('loading');
  btn.disabled = false;
  renderAll();
}

function finalizePrices(count, source, debugLines) {
  state.lastSync = new Date().toLocaleTimeString();
  state.lastDate = 'live';
  savePrices();
  updateSyncStatus(`✓ merolagani.com · ${count} stocks · ${state.lastSync}`, false);
  showToast(`✓ ${count} live prices loaded from merolagani.com`);
  const dd = document.getElementById('data-date');
  if (dd) dd.textContent = `Live · merolagani.com · ${new Date().toLocaleDateString()}`;
  if (debugLines) console.log('[SYNC] Success via', source);
  hideDebugPanel();
}

// ── Parse merolagani LatestMarket.aspx HTML table ──
// Replicates exactly what =ImportHTML(...,"table",1) does in Google Sheets
// Table columns: Symbol | LTP | % Change | High | Low | Vol | Prev. Close | Turnover
function parseMerolaganiHTML(html, log) {
  if (!log) log = () => {};
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const tables = doc.querySelectorAll('table');
  log(`Found ${tables.length} tables in HTML`);
  let priceTable = null;

  for (const tbl of tables) {
    const firstRow = tbl.querySelector('tr');
    if (!firstRow) continue;
    const text = firstRow.textContent.toLowerCase();
    if (text.includes('symbol') || text.includes('ltp') || text.includes('% change')) {
      priceTable = tbl;
      log(`Found price table by header keywords`);
      break;
    }
  }

  if (!priceTable) {
    let maxRows = 0;
    for (const tbl of tables) {
      const rows = tbl.querySelectorAll('tr');
      if (rows.length > maxRows) { maxRows = rows.length; priceTable = tbl; }
    }
    if (priceTable) log(`Using largest table (${priceTable.querySelectorAll('tr').length} rows)`);
  }

  if (!priceTable) { log(`No table found in HTML`); return 0; }

  const rows = priceTable.querySelectorAll('tr');
  let count = 0;
  let symCol = 0, ltpCol = 1, chgCol = 2, prevCloseCol = 6;

  // Detect column positions from header row
  const headerRow = rows[0];
  if (headerRow) {
    const headers = Array.from(headerRow.querySelectorAll('th,td')).map(td => td.textContent.trim().toLowerCase());
    log(`Headers: ${headers.join(' | ')}`);
    headers.forEach((h, i) => {
      if (h.includes('symbol') || h === 's.n.' || h === 'company') symCol = i;
      else if (h.includes('ltp') || h.includes('last traded')) ltpCol = i;
      else if (h.includes('% change') || h.includes('%change') || h.includes('change%')) chgCol = i;
      else if (h.includes('prev') || h.includes('previous')) prevCloseCol = i;
    });
    log(`Cols → sym:${symCol} ltp:${ltpCol} chg:${chgCol} prev:${prevCloseCol}`);
  }

  for (let i = 1; i < rows.length; i++) {
    const cells = rows[i].querySelectorAll('td');
    if (cells.length < 3) continue;
    let sym = (cells[symCol]?.textContent || '').trim().toUpperCase().replace(/\s+/g, '');
    if (!sym || sym.length < 2 || sym.length > 12) continue;
    if (/^[0-9]+$/.test(sym)) continue;
    const ltpRaw = (cells[ltpCol]?.textContent || '').trim().replace(/,/g, '');
    const ltp = parseFloat(ltpRaw);
    if (isNaN(ltp) || ltp <= 0) continue;
    const chgRaw = (cells[chgCol]?.textContent || '').trim().replace(/,/g, '');
    const chgNum = parseFloat(chgRaw);
    const chgStr = !isNaN(chgNum) ? (chgNum >= 0 ? `+${chgNum.toFixed(2)}%` : `${chgNum.toFixed(2)}%`) : '—';
    const prevRaw = (cells[prevCloseCol]?.textContent || '').trim().replace(/,/g, '');
    const prevClose = parseFloat(prevRaw);
    const chgPt = !isNaN(prevClose) && prevClose > 0 ? (ltp - prevClose).toFixed(2) : '—';
    state.prices[sym] = { ltp, chg: chgStr, chgPt, prevClose: isNaN(prevClose) ? null : prevClose, source: 'merolagani' };
    count++;
  }

  log(`Parsed ${count} stocks from table`);
  return count;
}

function updateSyncStatus(msg, isError) {
  const el = document.getElementById('last-sync');
  if (el) {
    el.textContent = msg;
    el.style.color = isError ? 'var(--red)' : 'var(--text3)';
  }
}

function getPrice(sym) {
  return state.prices[sym] ? state.prices[sym].ltp : null;
}

// ═══════════════════════════════════════════════════════
// PORTFOLIO CALCULATIONS
// ═══════════════════════════════════════════════════════

function calcHolding(h) {
  const ltp = getPrice(h.sym);
  const cost = h.qty * h.wacc;
  const current = ltp ? h.qty * ltp : null;
  const pl = current !== null ? current - cost : null;
  const plPct = pl !== null ? (pl / cost) * 100 : null;
  return { ...h, ltp, cost, current, pl, plPct };
}

function calcPortfolioSummary(portfolio) {
  let totalCost = 0, totalCurrent = 0, totalPL = 0;
  let countPriced = 0;
  portfolio.holdings.forEach(h => {
    const c = calcHolding(h);
    totalCost += c.cost;
    if (c.current !== null) { totalCurrent += c.current; totalPL += c.pl; countPriced++; }
    else totalCurrent += c.cost;
  });
  const totalPlPct = totalCost > 0 ? (totalPL / totalCost) * 100 : 0;
  return { totalCost, totalCurrent, totalPL, totalPlPct, countPriced, total: portfolio.holdings.length };
}

function renderHoldingsRows(holdings) {
  if (holdings.length === 0) return '<tr><td colspan="12" style="text-align:center;padding:28px;color:var(--text3);">No holdings yet. Click + Add Holding.</td></tr>';
  return holdings.map((h, i) => {
    const plColor = !h.pl ? 'var(--text2)' : h.pl >= 0 ? 'var(--green)' : 'var(--red)';
    const plSign = !h.pl ? '' : h.pl >= 0 ? '+' : '';
    const plPctStr = h.plPct !== null ? `${plSign}${h.plPct.toFixed(2)}%` : '—';
    const ltpInfo = state.prices[h.sym];
    const isLive = ltpInfo?.source === 'merolagani';
    const chgIsNeg = ltpInfo?.chg && ltpInfo.chg.includes('-');
    const chgIsPos = ltpInfo?.chg && ltpInfo.chg.includes('+');
    const ltpClass = chgIsNeg ? 'ltp-down' : chgIsPos ? 'ltp-up' : 'ltp-flat';
    const ltpBadge = h.ltp
      ? `<div style="display:flex;flex-direction:column;gap:2px;">
           <span class="ltp-badge ${ltpClass}">
             <strong>${h.ltp.toLocaleString()}</strong>
             ${isLive ? '<span style="font-size:8px;background:rgba(46,204,113,.25);color:var(--green);padding:1px 5px;border-radius:2px;margin-left:3px;font-weight:700;">LIVE</span>' : ''}
           </span>
           <span style="font-size:10px;color:${chgIsNeg?'var(--red)':chgIsPos?'var(--green)':'var(--text3)'};">
             ${ltpInfo?.chgPt && ltpInfo.chgPt !== '—' ? (parseFloat(ltpInfo.chgPt)>=0?'+':'')+ltpInfo.chgPt+' · ' : ''}${ltpInfo?.chg || '—'}
           </span>
         </div>`
      : `<span style="color:var(--text3);font-size:10px;">No data</span>`;
    const signal = ltpInfo?.signal || '—';
    const signalClass = signal.toLowerCase().includes('bull') ? 'pill-green' : signal.toLowerCase().includes('bear') ? 'pill-red' : 'pill-amber';
    const maxPct = 25;
    const barW = h.plPct !== null ? Math.min(Math.abs(h.plPct), maxPct) / maxPct * 100 : 0;
    const pid = state.activeId;
    return `
      <tr>
        <td style="color:var(--text3);">${i+1}</td>
        <td><span class="sym">${h.sym}</span></td>
        <td>${fmtNum(h.qty, 0)}</td>
        <td>
          ${h.wacc.toFixed(2)}
          <button class="edit-inline" onclick="openEditWacc('${pid}','${h.sym}')">✏</button>
        </td>
        <td>Rs.${fmtNum(h.cost)}</td>
        <td>${ltpBadge}</td>
        <td>${h.current !== null ? 'Rs.'+fmtNum(h.current) : '—'}</td>
        <td style="color:${plColor};">${h.pl !== null ? plSign+'Rs.'+fmtNum(Math.abs(h.pl)) : '—'}</td>
        <td style="color:${plColor};font-weight:500;">${plPctStr}</td>
        <td style="min-width:60px;">
          <div class="profit-bar-wrap"><div class="profit-bar ${h.pl>=0?'pos':'neg'}" style="width:${barW}%;"></div></div>
        </td>
        <td><span class="pill ${signalClass}">${signal}</span></td>
        <td>
          <button class="edit-inline" onclick="removeHolding('${pid}','${h.sym}')" style="color:var(--red);border-color:var(--red-dim);">✕</button>
        </td>
      </tr>

}

function renderTransactions(txs) {
  if (!txs || txs.length === 0) return '<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px;">No transactions recorded.</div>';
  const sorted = [...txs].sort((a,b) => new Date(b.date) - new Date(a.date));
  return sorted.map(t => `
    <div class="tx-item">
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="pill ${t.type==='BUY'?'pill-green':'pill-red'}">${t.type}</span>
        <span class="tx-sym">${t.sym}</span>
        <span style="color:var(--text2);">${fmtNum(t.qty,0)} @ Rs.${fmtNum(t.price)}</span>
        ${t.note ? `<span style="color:var(--text3);font-size:10px;">· ${t.note}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="color:${t.type==='BUY'?'var(--green)':'var(--red)'};font-weight:500;">Rs.${fmtNum(t.qty*t.price)}</span>
        <span class="tx-date">${t.date}</span>
        <button class="edit-inline" onclick="removeTx('${t.id}')" style="color:var(--red);border-color:var(--red-dim);">✕</button>
      </div>
    </div>
  `).join('');
}

let allocChart = null, plChart = null;

function renderAllocChart(holdings) {
  const ctx = document.getElementById('chart-alloc');
  if (!ctx) return;
  if (allocChart) { allocChart.destroy(); allocChart = null; }
  const labels = holdings.map(h => h.sym);
  const vals = holdings.map(h => h.cost);
  const colors = ['#2ecc71','#27ae60','#1abc9c','#16a085','#3498db','#2980b9','#9b59b6','#8e44ad','#e67e22','#f39c12'];
  allocChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: vals,
        backgroundColor: colors.slice(0, holdings.length),
        borderColor: '#0b0f0c',
        borderWidth: 3,
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#7aaa80', font: { family: 'DM Mono', size: 11 }, padding: 12, boxWidth: 12 } },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: Rs.${fmtNum(ctx.raw)} (${((ctx.raw/vals.reduce((a,b)=>a+b,0))*100).toFixed(1)}%)`
          }
        }
      }
    }
  });
}

function renderPLChart(holdings) {
  const ctx = document.getElementById('chart-pl');
  if (!ctx) return;
  if (plChart) { plChart.destroy(); plChart = null; }
  const priced = holdings.filter(h => h.pl !== null);
  if (priced.length === 0) return;
  const labels = priced.map(h => h.sym);
  const vals = priced.map(h => h.pl);
  const colors = vals.map(v => v >= 0 ? 'rgba(46,204,113,0.8)' : 'rgba(231,76,60,0.8)');
  const borderColors = vals.map(v => v >= 0 ? '#2ecc71' : '#e74c3c');
  plChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'P&L (Rs.)',
        data: vals,
        backgroundColor: colors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` Rs.${fmtNum(ctx.raw)} (${priced[ctx.dataIndex].plPct.toFixed(2)}%)`
          }
        }
      },
      scales: {
        x: { grid: { color: '#1e2d20' }, ticks: { color: '#7aaa80', font: { family: 'DM Mono', size: 11 } } },
        y: {
          grid: { color: '#1e2d20' },
          ticks: { color: '#7aaa80', font: { family: 'DM Mono', size: 11 }, callback: v => 'Rs.' + fmtNum(v) }
        }
      }
    }
  });
}

function addPortfolio() {
  const name = document.getElementById('new-p-name').value.trim();
  const desc = document.getElementById('new-p-desc').value.trim();
  const avatar = (document.getElementById('new-p-avatar').value.trim() || name.slice(0,2)).toUpperCase();

  const p = { id: uid(), name, desc, avatar, color, holdings: [], transactions: [] };

  closeModal('modal-add-portfolio');
  ['new-p-name','new-p-desc','new-p-avatar'].forEach(id => document.getElementById(id).value='');
  renderAll();
  showToast('✓ Portfolio created');

function addHolding() {
  const sym = document.getElementById('h-sym').value.trim().toUpperCase();
  const qty = parseFloat(document.getElementById('h-qty').value);
  const wacc = parseFloat(document.getElementById('h-wacc').value);
  const date = document.getElementById('h-date').value;
  if (!sym || isNaN(qty) || isNaN(wacc)) { showToast('All fields required', true); return; }
  const p = state.portfolios.find(p => p.id === state.activeId);
  if (!p) return;
  const existing = p.holdings.find(h => h.sym === sym);
  if (existing) { showToast(`${sym} already in portfolio. Use Edit WACC to update.`, true); return; }
  p.holdings.push({ sym, qty, wacc, date });
  p.transactions.push({ id: uid(), type: 'BUY', sym, qty, price: wacc, date, note: 'Manual entry' });
  saveState();
  closeModal('modal-add-holding');
  renderAll();
  showToast(`✓ ${sym} added to portfolio`);
}

function removeHolding(pid, sym) {
  if (!confirm(`Remove ${sym} from portfolio?`)) return;
  const p = state.portfolios.find(p => p.id === pid);
  if (!p) return;
  p.holdings = p.holdings.filter(h => h.sym !== sym);
  saveState(); renderAll();
  showToast(`✓ ${sym} removed`);
}

function renamePortfolio(pid, name) {
  const p = state.portfolios.find(p => p.id === pid);
  if (p) { p.name = name; saveState(); renderSidebar(); }
}

function deletePortfolio(pid) {
  if (!confirm('Delete this portfolio? This cannot be undone.')) return;
  state.portfolios = state.portfolios.filter(p => p.id !== pid);
  state.activeId = state.portfolios[0]?.id || null;
  saveState(); renderAll();
  showToast('Portfolio deleted');
}

// TRANSACTION
function setTxType(type) {
  txType = type;
  document.getElementById('tx-buy-btn').className = 'tx-type-btn buy' + (type==='BUY'?' active':'');
  document.getElementById('tx-sell-btn').className = 'tx-type-btn sell' + (type==='SELL'?' active':'');
  document.getElementById('tx-submit-btn').textContent = type === 'BUY' ? 'Record Buy' : 'Record Sell';
  document.getElementById('tx-submit-btn').className = type === 'BUY' ? 'btn btn-green' : 'btn btn-red';
}

function submitTransaction() {
  const sym = document.getElementById('tx-sym').value.trim().toUpperCase();
  const qty = parseFloat(document.getElementById('tx-qty').value);
  const price = parseFloat(document.getElementById('tx-price').value);
  const date = document.getElementById('tx-date').value;
  const note = document.getElementById('tx-note').value.trim();
  if (!sym || isNaN(qty) || isNaN(price)) { showToast('Symbol, qty and price required', true); return; }
  const p = state.portfolios.find(p => p.id === state.activeId);
  if (!p) return;

  // Record transaction
  p.transactions.push({ id: uid(), type: txType, sym, qty, price, date, note });

  // Update holding
  if (txType === 'BUY') {
    const existing = p.holdings.find(h => h.sym === sym);
    if (existing) {
      // Recalculate WACC
      const totalCost = existing.qty * existing.wacc + qty * price;
      const totalQty = existing.qty + qty;
      existing.wacc = totalCost / totalQty;
      existing.qty = totalQty;
    } else {
      p.holdings.push({ sym, qty, wacc: price, date });
    }
  } else {
    // SELL - reduce qty
    const existing = p.holdings.find(h => h.sym === sym);
    if (existing) {
      existing.qty -= qty;
      if (existing.qty <= 0) p.holdings = p.holdings.filter(h => h.sym !== sym);
    }
  }

  saveState();
  closeModal('modal-transaction');
  ['tx-sym','tx-qty','tx-price','tx-note'].forEach(id => document.getElementById(id).value='');
  renderAll();
  showToast(`✓ ${txType} transaction recorded for ${sym}`);
}

function removeTx(txId) {
  const p = state.portfolios.find(p => p.id === state.activeId);
  if (!p) return;
  p.transactions = p.transactions.filter(t => t.id !== txId);
  saveState(); renderMainView();
  showToast('Transaction removed');
}

// EDIT WACC
function openEditWacc(pid, sym) {
  editWaccSym = sym; editWaccPid = pid;
  const p = state.portfolios.find(p => p.id === pid);
  const h = p?.holdings.find(h => h.sym === sym);
  document.getElementById('edit-wacc-sym-label').textContent = sym;
  document.getElementById('edit-wacc-val').value = h?.wacc || '';
  document.getElementById('edit-wacc-qty').value = '';
  openModal('modal-edit-wacc');
}

function saveWacc() {
  const newWacc = parseFloat(document.getElementById('edit-wacc-val').value);
  const newQty = document.getElementById('edit-wacc-qty').value;
  if (isNaN(newWacc)) { showToast('Valid WACC required', true); return; }
  const p = state.portfolios.find(p => p.id === editWaccPid);
  const h = p?.holdings.find(h => h.sym === editWaccSym);
  if (h) {
    h.wacc = newWacc;
    if (newQty && !isNaN(parseFloat(newQty))) h.qty = parseFloat(newQty);
  }
  saveState(); closeModal('modal-edit-wacc'); renderAll();
  showToast(`✓ WACC updated for ${editWaccSym}`);
}

// TABS
function switchTab(name, el) {
  document.querySelectorAll('.h-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name)?.classList.add('active');
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════

function fmtNum(n, dec = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.abs(n).toLocaleString('en-NP', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function today() { return new Date().toISOString().slice(0,10); }

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

let toastTimeout;
function showToast(msg, isError=false, duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), duration);
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

// Market status
function updateMarketStatus() {
  const now = new Date();
  // NEPSE is open Sun-Thu 11:00-15:00 NPT (UTC+5:45)
  const nptOffset = 5 * 60 + 45;
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  const npt = new Date(utcMs + nptOffset * 60000);
  const day = npt.getDay(); // 0=Sun,1=Mon..6=Sat
  const h = npt.getHours(), m = npt.getMinutes();
  const mins = h * 60 + m;
  const isWeekday = day >= 0 && day <= 4; // Sun-Thu
  const inHours = mins >= 660 && mins < 900; // 11:00-15:00
  const open = isWeekday && inHours;
  document.getElementById('mkt-dot').className = 'mkt-dot ' + (open ? 'open' : 'closed');
  document.getElementById('mkt-status-text').textContent = open ? 'Market Open' : 'Market Closed';
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadState();
renderAll();
updateMarketStatus();
setInterval(updateMarketStatus, 60000);

// Auto-sync on load
if (state.portfolios.length > 0) {
  setTimeout(() => syncLatestPrices(), 800);
}
</script>
