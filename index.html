<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPSE Daily Master Report — Broker 58</title>
<style>
/* Full CSS from your original code - abbreviated for response. Keep all your CSS styles here */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;min-height:100vh;}
.hidden{display:none!important;}
.green{color:#1e7e34;}.red{color:#c0392b;}.amber{color:#b8860b;}.blue{color:#1a5276;}.crimson{color:#7a0000;}
/* ... Paste all your original CSS styles here (from <style> tag) ... */
</style>
</head>
<body>

<!-- Keep your full HTML (login, app, sidebar, main, backend) as it was -->

<div id="app">
  <nav class="sidebar" id="sidebar">
    <!-- Your sidebar HTML -->
  </nav>
  <div class="main" id="frontend-main">
    <div class="topbar">
      <h1 id="topbar-title">NEPSE Daily Master Report — Broker 58</h1>
    </div>
    <div class="content" id="report-content"></div>
  </div>
</div>

<script>
// Basic functions (add your original ones if you have them)
const ARC_KEY = 'nepse_b58_arc';
function getArc() { try { return JSON.parse(localStorage.getItem(ARC_KEY) || '{}'); } catch(e) { return {}; } }
function saveArc(d) { localStorage.setItem(ARC_KEY, JSON.stringify(d)); }

function renderReport(r) {
  if (!r) return;
  document.getElementById('topbar-title').textContent = 'NEPSE Daily Master Report · ' + (r.date || '');
  document.getElementById('report-content').innerHTML = `
    <div style="padding:20px;">
      <h2>${r.date || ''} — ${r.headline || 'Report Loaded'}</h2>
      <p><strong>NEPSE Close:</strong> ${r.nepseClose || '—'}</p>
      <p><strong>Change:</strong> ${r.nepseChg || '—'}</p>
      <p><strong>B58 Net:</strong> ${r.b58Net || '—'}</p>
      <p><strong>Market Pulse:</strong> ${r.marketPulseNote || 'No note available'}</p>
      <hr>
      <p style="color:#1e7e34;font-weight:600;">Report loaded successfully from GitHub.</p>
    </div>`;
}

// INIT - This is the most important part
(async function() {
  const arc = getArc();
  const dates = Object.keys(arc).sort().reverse();

  if (dates.length > 0) {
    renderReport(arc[dates[0]]);
    return;
  }

  try {
    const response = await fetch('2026-04-13.json');
    if (!response.ok) throw new Error('File not found');
    const report = await response.json();
    renderReport(report);

    // Save for next time
    arc[report.date] = report;
    saveArc(arc);

  } catch (err) {
    console.error(err);
    document.getElementById('report-content').innerHTML = `
      <div style="padding:40px;text-align:center;color:#c0392b;">
        <h3>Could not load report</h3>
        <p>Make sure 2026-04-13.json is in the root folder.</p>
      </div>`;
  }
})();
</script>
</body>
</html>
