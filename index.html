<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPSE Daily Master Report — Broker 58</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;min-height:100vh;}
.hidden{display:none!important;}
.green{color:#1e7e34;}.red{color:#c0392b;}.amber{color:#b8860b;}.blue{color:#1a5276;}.crimson{color:#7a0000;}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;}
.bg{background:#1e4d1e;color:#a8e6a8;}.br{background:#4d1e1e;color:#e6a8a8;}.ba{background:#4d3a0a;color:#f0d080;}.bb{background:#0a2a4d;color:#80b8f0;}.bcrit{background:#7a0000;color:#ffaaaa;}
.alert{background:#f0faf4;border:1px solid #a8dfc0;border-radius:8px;padding:10px 14px;font-size:12px;color:#1e5c34;margin-top:10px;line-height:1.6;}
.alert-warn{background:#fef5f5;border-color:#f0b0b0;color:#7a1a1a;}
.alert-amber{background:#fffbf0;border-color:#f0d080;color:#7a5a00;}
.alert-critical{background:#fff0f0;border:2px solid #7a0000;border-radius:8px;padding:12px 16px;font-size:13px;color:#7a0000;margin-top:10px;font-weight:700;}
.btn{border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-primary{background:#1a0f0f;color:#ffcc88;}.btn-primary:hover{background:#2a1a1a;}
.btn-danger{background:#c0392b;color:#fff;}.btn-success{background:#1e7e34;color:#fff;}
.btn-outline{background:#f8fafc;color:#444;border:1px solid #ddd;}.btn-outline:hover{background:#eee;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a0f0f,#0f1a10);}
.login-card{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-card .logo{font-size:40px;margin-bottom:12px;}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.login-card p{font-size:12px;color:#888;margin-bottom:24px;}
.login-card input{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:12px;outline:none;}
.login-card input:focus{border-color:#1a0f0f;}
.login-error{font-size:12px;color:#c0392b;margin-bottom:10px;display:none;}

/* APP SHELL */
#app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:230px;min-width:230px;background:#0f1a10;color:#a8e6a8;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;transition:transform .3s;}
.sidebar-logo{padding:16px 16px 10px;border-bottom:1px solid #1e4d1e;}
.sidebar-logo .brand{font-size:10px;color:#5aad5a;letter-spacing:.06em;margin-bottom:3px;}
.sidebar-logo h2{font-size:13px;font-weight:700;color:#b0f0b0;line-height:1.3;}
.sidebar-logo .date-badge{font-size:10px;color:#fff;background:#c0392b;border-radius:4px;padding:2px 6px;margin-top:5px;display:inline-block;}
.archive-wrap{padding:10px 14px;border-bottom:1px solid #1e4d1e;}
.archive-wrap label{font-size:10px;font-weight:700;color:#5aad5a;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;}
.archive-wrap select{width:100%;background:#0a1a0a;color:#b0f0b0;border:1px solid #2a5a2a;border-radius:5px;padding:6px 8px;font-size:11px;outline:none;cursor:pointer;}
.nav-label{font-size:10px;font-weight:700;color:#3a7a3a;text-transform:uppercase;letter-spacing:.08em;padding:12px 16px 5px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:12px;color:#7dca7d;border-left:3px solid transparent;transition:all .15s;}
.nav-item:hover{background:#1a3a1a;color:#b0f0b0;border-left-color:#5aad5a;}
.nav-item.active{background:#1e4d1e;color:#b0f0b0;border-left-color:#7dca7d;font-weight:600;}
.nav-item .icon{font-size:13px;min-width:16px;text-align:center;}
.nav-badge{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px;}
.nb-red{background:#4d1e1e;color:#e68a8a;}.nb-gold{background:#4d3a0a;color:#f0d080;}.nb-blue{background:#0a2a4d;color:#80b8f0;}.nb-crit{background:#7a0000;color:#ffaaaa;}
.sidebar-btns{padding:10px 14px;}
.sidebar-btns button{width:100%;border:none;border-radius:6px;padding:9px 0;font-size:11px;font-weight:700;cursor:pointer;}
.btn-dl{background:#c0392b;color:#fff;}.btn-dl:hover{background:#a93226;}
.sidebar-footer{padding:10px 16px;border-top:1px solid #1e4d1e;font-size:10px;color:#3a7a3a;line-height:1.5;}

/* MAIN */
.main{margin-left:230px;flex:1;}
.topbar{background:#0f1a10;color:#b0f0b0;padding:11px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px;}
.topbar h1{font-size:14px;font-weight:700;}
.hamburger{display:none;background:none;border:none;color:#b0f0b0;font-size:20px;cursor:pointer;margin-right:10px;}
.content{padding:20px;}
.section{background:#fff;border-radius:10px;border:1px solid #e2e6ea;padding:1.1rem 1.4rem;margin-bottom:1.1rem;display:none;}
.section.active-section{display:block;}
.section-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8ecf0;display:flex;align-items:center;gap:7px;}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.metric{background:#f8fafc;border-radius:8px;padding:12px;text-align:center;border:1px solid #e8ecf0;}
.metric .val{font-size:19px;font-weight:700;}.metric .lbl{font-size:10px;color:#888;margin-top:2px;}.metric .chg{font-size:12px;font-weight:600;margin-top:2px;}
.sectors-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}
.sector-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:5px;font-size:12px;}
.sector-green{background:#f0faf4;border:1px solid #c8e8d0;}.sector-red{background:#fef5f5;border:1px solid #f0c8c8;}
.movers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.mover-card{background:#f8fafc;border-radius:7px;padding:10px;border:1px solid #e8ecf0;}
.card-title{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.mover-item{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid #eee;}.mover-item:last-child{border-bottom:none;}
.b58-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.b58-metric{background:#f8fafc;border-radius:7px;padding:12px;text-align:center;border:1px solid #e8ecf0;}
.b58-metric .val{font-size:18px;font-weight:700;}.b58-metric .lbl{font-size:10px;color:#888;margin-top:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.sub-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{text-align:left;padding:7px;font-size:10px;color:#555;font-weight:700;background:#f4f6f8;border-bottom:2px solid #e2e6ea;}
td{padding:6px 7px;border-bottom:1px solid #f0f2f4;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafbfc;}
.bar-pos{display:inline-block;height:6px;background:#27ae60;border-radius:2px;vertical-align:middle;}
.bar-neg{display:inline-block;height:6px;background:#c0392b;border-radius:2px;vertical-align:middle;}
.star{color:#e6b800;}
.sig{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;}
.sig-bull{background:#e6f7ee;color:#1e7e34;}.sig-bear{background:#fdecea;color:#c0392b;}.sig-mix{background:#fef9e7;color:#8a6a00;}.sig-neu{background:#eaf4fb;color:#1a4a6e;}.sig-ob{background:#f3e5f5;color:#6a1b9a;}
.act-add{color:#1e7e34;font-weight:700;}.act-hold{color:#1a5276;font-weight:700;}.act-watch{color:#8a6a00;font-weight:700;}.act-avoid{color:#c0392b;font-weight:700;}.act-caut{color:#c05000;font-weight:700;}
.ap-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.ap-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px 8px 12px;background:#f8fafc;border-radius:6px;font-size:11px;gap:7px;border:1px solid #eef1f4;}
.ap-sym{font-weight:700;min-width:55px;}.ap-note{font-size:9px;color:#888;flex:1;text-align:right;}
.ap-urgent{border-left:4px solid #27ae60;}.ap-monitor{border-left:4px solid #2980b9;}.ap-watch{border-left:4px solid #e6b800;}.ap-caution{border-left:4px solid #c05000;}.ap-avoid-row{border-left:4px solid #c0392b;}
.insight{background:#f8fafc;border-radius:7px;padding:12px 14px;margin-bottom:9px;border:1px solid #e8ecf0;border-left:4px solid #27ae60;}
.insight.warn{border-left-color:#c0392b;}.insight.amber-ins{border-left-color:#e6b800;}.insight.blue-ins{border-left-color:#2980b9;}.insight.critical{border-left-color:#7a0000;background:#fff5f5;}
.ins-num{font-size:9px;font-weight:700;color:#888;margin-bottom:3px;text-transform:uppercase;}
.ins-title{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.ins-body{font-size:11px;color:#555;line-height:1.6;}
.highlight-green td{background:#f0faf4!important;}.highlight-red td{background:#fef5f5!important;}.highlight-critical td{background:#fff0f0!important;}
.crisis-banner{background:#fff0f0;border:3px solid #7a0000;border-radius:10px;padding:14px 18px;margin-bottom:14px;}
.crisis-banner .icon{font-size:26px;margin-bottom:5px;}
.crisis-banner .title{font-size:15px;font-weight:700;color:#7a0000;margin-bottom:5px;}
.crisis-banner .body{font-size:11px;color:#5a1010;line-height:1.65;}
.about-card{background:#f8fafc;border-radius:10px;padding:16px;border:1px solid #e8ecf0;margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.about-avatar{width:65px;height:65px;border-radius:50%;background:#0f1a10;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#b0f0b0;flex-shrink:0;}
.obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.obj-item{border-radius:7px;padding:10px;border-left:3px solid;}
.page-footer{text-align:center;font-size:10px;color:#aaa;padding:16px 0 24px;border-top:1px solid #e8ecf0;margin-top:8px;}
.no-report{text-align:center;padding:60px 20px;color:#888;}
.no-report .icon{font-size:48px;margin-bottom:12px;}

/* BACKEND styles (same as before) */
#backend{display:none;flex:1;min-height:100vh;background:#f0f2f5;}
.backend-topbar{background:#1a0f0f;color:#ffcc88;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.backend-topbar h1{font-size:15px;font-weight:700;}
.backend-content{padding:24px;max-width:960px;margin:0 auto;}
.be-card{background:#fff;border-radius:10px;border:1px solid #e2e6ea;padding:1.25rem 1.5rem;margin-bottom:1.25rem;}
.be-card-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e8ecf0;}
.paste-area{width:100%;min-height:320px;border:2px solid #e2e6ea;border-radius:8px;padding:14px;font-size:12px;font-family:monospace;line-height:1.6;resize:vertical;outline:none;transition:border-color .2s;}
.paste-area:focus{border-color:#1e7e34;}
.paste-area::placeholder{color:#bbb;}
.parse-status{margin-top:10px;padding:10px 14px;border-radius:7px;font-size:12px;display:none;}
.parse-ok{background:#f0faf4;border:1px solid #a8dfc0;color:#1e5c34;}
.parse-err{background:#fef5f5;border:1px solid #f0b0b0;color:#c0392b;}
.prompt-box{background:#f8fafc;border:1px solid #e8ecf0;border-radius:8px;padding:14px;font-size:11px;font-family:monospace;line-height:1.7;color:#333;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;}
.copy-btn{background:#1a5276;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:11px;font-weight:700;cursor:pointer;margin-top:8px;}
.copy-btn:hover{background:#154360;}
.archive-table{width:100%;border-collapse:collapse;font-size:12px;}
.archive-table th{text-align:left;padding:8px 10px;font-size:11px;font-weight:700;background:#f4f6f8;border-bottom:2px solid #e2e6ea;}
.archive-table td{padding:8px 10px;border-bottom:1px solid #f0f2f4;}
.archive-table tr:hover td{background:#fafbfc;}
.analytics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.analytics-card{background:#f8fafc;border-radius:8px;padding:14px;text-align:center;border:1px solid #e8ecf0;}
.analytics-card .val{font-size:22px;font-weight:700;}.analytics-card .lbl{font-size:10px;color:#888;margin-top:3px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;}
.overlay.show{display:block;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hamburger{display:block;}
  .metrics-grid,.analytics-grid{grid-template-columns:repeat(2,1fr);}
  .movers-grid,.two-col,.obj-grid{grid-template-columns:1fr;}
  .ap-grid,.sectors-grid{grid-template-columns:1fr;}
}
</style>
</head>

<script>
// ... (All your existing functions: storage, analytics, auth, prompt, parse, archive, renderReport, buildHTML, etc. stay the same)

// ── INIT ──────────────────────────────────────────
(async function(){
  recordView();
  populateArchiveSelect();

  const arc = getArc();
  const dates = Object.keys(arc).sort().reverse();

  // 1. Owner: Use localStorage if you have saved reports
  if (dates.length) {
    renderReport(arc[dates[0]]);
    return;
  }

  // 2. Visitors: Auto-load the report from root
  try {
    const response = await fetch('2026-04-13.json');   // ← Correct path (root)

    if (!response.ok) throw new Error('Report not found');

    const report = await response.json();

    renderReport(report);

    // Save to localStorage for faster reloads
    arc[report.date] = report;
    saveArc(arc);
    populateArchiveSelect();

  } catch (err) {
    console.error(err);
    const defaultReport = {
      "date": "2026-04-13",
      "headline": "Report Loading Failed",
      "nepseClose": "—",
      "nepseChg": "—",
      "b58Stance": "—",

      "subIndices": [],
      "topGainers": [],
      "topLosers": [],
      "b58Purchases": [],
      "b58Sales": [],
      "netAccum": [],
      "technical": [],
      "tradePlan": [],
      "keyInsights": [],
      "actionPlan": [],
      "disclaimer": ["Not financial advice — Personal tracking only."]
    };
    renderReport(defaultReport);
  }
})();
</script>
