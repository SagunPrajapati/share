<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPSE Daily Master Report — Broker 58</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;min-height:100vh;}
.hidden{display:none!important;}
.green{color:#1e7e34;}.red{color:#c0392b;}.amber{color:#b8860b;}.blue{color:#1a5276;}.crimson{color:#7a0000;}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;}
.bg{background:#1e4d1e;color:#a8e6a8;}.br{background:#4d1e1e;color:#e6a8a8;}.ba{background:#4d3a0a;color:#f0d080;}.bb{background:#0a2a4d;color:#80b8f0;}.bcrit{background:#7a0000;color:#ffaaaa;}
.alert{background:#f0faf4;border:1px solid #a8dfc0;border-radius:8px;padding:10px 14px;font-size:12px;color:#1e5c34;margin-top:10px;line-height:1.6;}
.alert-warn{background:#fef5f5;border-color:#f0b0b0;color:#7a1a1a;}
.alert-amber{background:#fffbf0;border-color:#f0d080;color:#7a5a00;}
.alert-critical{background:#fff0f0;border:2px solid #7a0000;border-radius:8px;padding:12px 16px;font-size:13px;color:#7a0000;margin-top:10px;font-weight:700;}
.btn{border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-primary{background:#1a0f0f;color:#ffcc88;}.btn-primary:hover{background:#2a1a1a;}
.btn-danger{background:#c0392b;color:#fff;}.btn-success{background:#1e7e34;color:#fff;}
.btn-outline{background:#f8fafc;color:#444;border:1px solid #ddd;}.btn-outline:hover{background:#eee;}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a0f0f,#0f1a10);}
.login-card{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-card .logo{font-size:40px;margin-bottom:12px;}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.login-card p{font-size:12px;color:#888;margin-bottom:24px;}
.login-card input{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:12px;outline:none;}
.login-card input:focus{border-color:#1a0f0f;}
.login-error{font-size:12px;color:#c0392b;margin-bottom:10px;display:none;}

#app{display:flex;min-height:100vh;}
.sidebar{width:230px;min-width:230px;background:#0f1a10;color:#a8e6a8;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;transition:transform .3s;}
.sidebar-logo{padding:16px 16px 10px;border-bottom:1px solid #1e4d1e;}
.sidebar-logo .brand{font-size:10px;color:#5aad5a;letter-spacing:.06em;margin-bottom:3px;}
.sidebar-logo h2{font-size:13px;font-weight:700;color:#b0f0b0;line-height:1.3;}
.sidebar-logo .date-badge{font-size:10px;color:#fff;background:#c0392b;border-radius:4px;padding:2px 6px;margin-top:5px;display:inline-block;}
.archive-wrap{padding:10px 14px;border-bottom:1px solid #1e4d1e;}
.archive-wrap label{font-size:10px;font-weight:700;color:#5aad5a;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;}
.archive-wrap select{width:100%;background:#0a1a0a;color:#b0f0b0;border:1px solid #2a5a2a;border-radius:5px;padding:6px 8px;font-size:11px;outline:none;cursor:pointer;}
.nav-label{font-size:10px;font-weight:700;color:#3a7a3a;text-transform:uppercase;letter-spacing:.08em;padding:12px 16px 5px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:12px;color:#7dca7d;border-left:3px solid transparent;transition:all .15s;}
.nav-item:hover{background:#1a3a1a;color:#b0f0b0;border-left-color:#5aad5a;}
.nav-item.active{background:#1e4d1e;color:#b0f0b0;border-left-color:#7dca7d;font-weight:600;}
.nav-item .icon{font-size:13px;min-width:16px;text-align:center;}
.nav-badge{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px;}
.nb-red{background:#4d1e1e;color:#e68a8a;}.nb-gold{background:#4d3a0a;color:#f0d080;}.nb-blue{background:#0a2a4d;color:#80b8f0;}.nb-crit{background:#7a0000;color:#ffaaaa;}
.sidebar-btns{padding:10px 14px;}
.sidebar-btns button{width:100%;border:none;border-radius:6px;padding:9px 0;font-size:11px;font-weight:700;cursor:pointer;}
.btn-dl{background:#c0392b;color:#fff;}.btn-dl:hover{background:#a93226;}
.sidebar-footer{padding:10px 16px;border-top:1px solid #1e4d1e;font-size:10px;color:#3a7a3a;line-height:1.5;}

.main{margin-left:230px;flex:1;}
.topbar{background:#0f1a10;color:#b0f0b0;padding:11px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px;}
.topbar h1{font-size:14px;font-weight:700;}
.hamburger{display:none;background:none;border:none;color:#b0f0b0;font-size:20px;cursor:pointer;margin-right:10px;}
.content{padding:20px;}
.section{background:#fff;border-radius:10px;border:1px solid #e2e6ea;padding:1.1rem 1.4rem;margin-bottom:1.1rem;display:none;}
.section.active-section{display:block;}
.section-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8ecf0;display:flex;align-items:center;gap:7px;}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.metric{background:#f8fafc;border-radius:8px;padding:12px;text-align:center;border:1px solid #e8ecf0;}
.metric .val{font-size:19px;font-weight:700;}.metric .lbl{font-size:10px;color:#888;margin-top:2px;}.metric .chg{font-size:12px;font-weight:600;margin-top:2px;}
.no-report{text-align:center;padding:60px 20px;color:#888;}
.no-report .icon{font-size:48px;margin-bottom:12px;}
</style>
</head>
<body>

<!-- MAIN APP -->
<div id="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="brand">BROKER 58 — NAASA SECURITIES</div>
      <h2>NEPSE Daily Master Report</h2>
      <span class="date-badge" id="sidebar-date">Loading...</span>
    </div>
    <div class="sidebar-footer">
      By Sagun Prajapati, MBA (Finance)<br>
      For personal tracking only.<br><br>
      <span onclick="goToAdmin()" style="color:#2a5a2a;cursor:pointer;font-size:10px;text-decoration:underline;">⚙ Admin Panel</span>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <h1 id="topbar-title">NEPSE Daily Master Report — Broker 58</h1>
    </div>
    <div class="content" id="report-content"></div>
  </div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────
const ARC_KEY = 'nepse_b58_arc';
function getArc() { 
  try { return JSON.parse(localStorage.getItem(ARC_KEY) || '{}'); } 
  catch(e) { return {}; } 
}
function saveArc(d) { localStorage.setItem(ARC_KEY, JSON.stringify(d)); }

// ── RENDER REPORT ─────────────────────────────────
function renderReport(r) {
  if (!r) {
    document.getElementById('report-content').innerHTML = `<div class="no-report"><div class="icon">📊</div><h3>No Report Loaded</h3></div>`;
    return;
  }

  const pos = r.nepseChg && r.nepseChg.includes('+');
  const b58pos = r.b58Net && (r.b58Net.includes('+') || r.b58Stance === 'NET BUYER');

  document.getElementById('topbar-title').textContent = `NEPSE Daily Master Report · ${r.date || ''}`;
  document.getElementById('sidebar-date').textContent = r.date || 'No Date';

  let html = `
    <div style="background:#fff;border-radius:10px;padding:20px;border:1px solid #e2e6ea;">
      <h2 style="margin-bottom:10px;">${r.date} — ${r.headline || 'Market Report'}</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;margin:20px 0;">
        <div style="background:#f8fafc;padding:15px;border-radius:8px;">
          <strong>NEPSE Close</strong><br>
          <span style="font-size:24px;font-weight:700;">${r.nepseClose || '—'}</span><br>
          <span class="${pos ? 'green' : 'red'}">${r.nepseChg || '—'}</span>
        </div>
        <div style="background:#f8fafc;padding:15px;border-radius:8px;">
          <strong>Broker 58</strong><br>
          <span style="font-size:22px;font-weight:700;color:${b58pos ? '#1e7e34' : '#c0392b'};">${r.b58Net || '—'}</span><br>
          <span>${r.b58Stance || ''}</span>
        </div>
      </div>
      <p style="line-height:1.6;color:#444;">${r.marketPulseNote || 'No market note available.'}</p>
      <hr style="margin:20px 0;">
      <p style="color:#1e7e34;font-weight:600;">✅ Report loaded successfully from GitHub (2026-04-13)</p>
    </div>
  `;

  document.getElementById('report-content').innerHTML = html;
}

// ── INIT ──────────────────────────────────────────
(async function(){
  const arc = getArc();
  const dates = Object.keys(arc).sort().reverse();

  // If owner has saved reports locally, show the latest one
  if (dates.length > 0) {
    renderReport(arc[dates[0]]);
    return;
  }

  // Otherwise load from GitHub
  try {
    const response = await fetch('2026-04-13.json');
    
    if (!response.ok) throw new Error('File not found');

    const report = await response.json();
    
    renderReport(report);

    // Save it locally for faster future visits
    arc[report.date] = report;
    saveArc(arc);

  } catch (err) {
    console.error("Failed to load 2026-04-13.json", err);
    document.getElementById('report-content').innerHTML = `
      <div style="padding:40px;text-align:center;color:#c0392b;background:#fff;border-radius:10px;border:1px solid #f0b0b0;">
        <h3>⚠️ Could not load the report</h3>
        <p>Make sure the file <strong>2026-04-13.json</strong> is uploaded in the root of the repository.</p>
        <p style="font-size:13px;margin-top:15px;">Current URL: https://sagunprajapati.github.io/share/</p>
      </div>`;
  }
})();
</script>
</body>
</html>
