<script>
// ── STORAGE, AUTH, PARSE, RENDER functions (use your original ones) ---

// ── INIT ──────────────────────────────────────────
(async function(){
  recordView();
  populateArchiveSelect();

  const arc = getArc();
  const dates = Object.keys(arc).sort().reverse();

  // 1. Owner has local data → show it
  if (dates.length > 0) {
    renderReport(arc[dates[0]]);
    return;
  }

  // 2. Load report from root (2026-04-13.json)
  try {
    const response = await fetch('2026-04-13.json');

    if (!response.ok) throw new Error('JSON file not found');

    const report = await response.json();

    renderReport(report);

    // Save to localStorage
    arc[report.date] = report;
    saveArc(arc);
    populateArchiveSelect();

    console.log("Report loaded successfully from 2026-04-13.json");

  } catch (err) {
    console.error("Failed to load report:", err);
    const defaultReport = {
      "date": "2026-04-13",
      "headline": "Report Loading Error",
      "nepseClose": "—",
      "nepseChg": "—",
      "b58Stance": "—",
      "b58Net": "—",
      "marketPulseNote": "Could not load 2026-04-13.json. Make sure the file is in the root folder and GitHub Pages is updated.",
      "subIndices": [],
      "topGainers": [],
      "topLosers": [],
      "b58Purchases": [],
      "b58Sales": [],
      "netAccum": [],
      "technical": [],
      "tradePlan": [],
      "keyInsights": [],
      "actionPlan": [],
      "disclaimer": ["Not financial advice — Personal tracking only."]
    };
    renderReport(defaultReport);
  }
})();
